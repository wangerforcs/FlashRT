# FlashVLA — Pi0.5 model configuration
name: pi05
vision_type: siglip
vlm_hidden: 2048
expert_hidden: 768
vlm_layers: 18
expert_layers: 18
decoder_steps: 10
action_dim: 32
chunk_size: 10

# Attention
num_heads: 16
num_kv_heads: 16          # MHA (not GQA)
head_dim: 128
rope_type: standard

# FFN
activation: gelu
intermediate_size: 8192   # 4 * vlm_hidden

# Vision encoder (SigLIP)
vision:
  patch_size: 14
  image_size: 224
  num_patches: 256
  hidden_dim: 1152
  num_layers: 27

# Quantization
quant:
  enabled: true
  dtype: fp8
  vision: fp8
  encoder: fp8
  decoder: fp8
  action_head: bf16        # precision-sensitive, no quant
  calibration: runtime     # first forward = calibrate, then static
